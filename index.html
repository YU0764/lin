<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小麟的画廊</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0c0c0e;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif}

/* ===== COVER ===== */
#cover{
  position:fixed;inset:0;
  background:#0c0c0e;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;
  transition:opacity 0.9s cubic-bezier(0.4,0,0.2,1);
}
#cover.out{opacity:0;pointer-events:none}
.cover-title{
  color:rgba(255,255,255,0.88);
  font-size:28px;font-weight:300;
  letter-spacing:6px;
  user-select:none;
}
.enter-wrap{
  position:fixed;bottom:44px;right:36px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  z-index:10000;
}
.enter-ring{
  position:absolute;
  width:52px;height:52px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  animation:ringPulse 2.2s ease-out infinite;
}
@keyframes ringPulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.75);opacity:0}}
.enter-btn{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.07);
  border:0.5px solid rgba(255,255,255,0.22);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;z-index:1;
  transition:background 0.25s,transform 0.2s;
}
.enter-btn:active{background:rgba(255,255,255,0.14);transform:scale(0.93)}
.enter-btn svg{width:18px;height:18px;stroke:rgba(255,255,255,0.7);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ===== GALLERY ===== */
#gallery{
  position:fixed;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.9s cubic-bezier(0.4,0,0.2,1);
  background:#0c0c0e;
  overflow:hidden;
}
#gallery.in{opacity:1;pointer-events:auto}

/* infinite canvas */
#world{
  position:absolute;
  /* big enough virtual canvas, centered via JS */
  width:2000px;height:2000px;
  transform-origin:0 0;
  will-change:transform;
}

.card{
  position:absolute;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:box-shadow 0.4s;
  box-shadow:0 8px 40px rgba(0,0,0,0.55);
}
.card img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  pointer-events:none;user-select:none;-webkit-user-select:none;
  border-radius:16px;
}

/* ===== DETAIL ===== */
#detail{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:500;
  opacity:0;pointer-events:none;
  transition:opacity 0.5s cubic-bezier(0.4,0,0.2,1);
  background:rgba(12,12,14,0);
}
#detail.in{opacity:1;pointer-events:auto;background:rgba(12,12,14,0.92)}
#detail-card{
  position:relative;
  border-radius:18px;overflow:hidden;
  box-shadow:0 32px 96px rgba(0,0,0,0.8);
  max-width:calc(100vw - 40px);
  max-height:calc(100vh - 100px);
}
#detail-card img{
  display:block;width:100%;height:100%;
  object-fit:cover;pointer-events:none;user-select:none;
}
#ripple-layer{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  opacity:0;pointer-events:none;
  border-radius:18px;
  z-index:2;
}
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <h1 class="cover-title">小麟的画廊</h1>
</div>
<div class="enter-wrap" id="enterWrap">
  <div class="enter-ring"></div>
  <div class="enter-btn" id="enterBtn">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </div>
</div>

<!-- GALLERY -->
<div id="gallery">
  <div id="world"></div>
</div>

<!-- DETAIL -->
<div id="detail" id="detail">
  <div id="detail-card">
    <img id="detail-img" src="" alt="">
    <div id="ripple-layer"></div>
  </div>
</div>

<script>
/* ---- image sources (relative paths) ---- */
const SRCS = [
  'B0AA02BBD2D987A2A22044118E38CB70.jpg',
  '42BCCB8EE0A4BB0164FD9E06B36036A7.png',
  'C9E4B074C55F00B610FDE1F25E034D58.jpg',
  'F5114C73E87841DEFC70C2B59D7D1455.jpg',
  '4D62773D4A5B43236AFCF200A5D940D1.jpg',
];
const PHOTO_SRC = '3BDF28271DB1658CB75DE11CD5D6016E.jpg';

/* ---- layout: positions on the 2000×2000 world canvas ---- */
const LAYOUT = [
  {x:660, y:640, w:280, h:340},
  {x:340, y:580, w:260, h:320},
  {x:990, y:560, w:240, h:300},
  {x:520, y:960, w:270, h:320},
  {x:830, y:940, w:250, h:310},
];

/* ---- state ---- */
const world   = document.getElementById('world');
const gallery = document.getElementById('gallery');
const cover   = document.getElementById('cover');
const enterWrap = document.getElementById('enterWrap');
const detail  = document.getElementById('detail');
const detailCard = document.getElementById('detail-card');
const detailImg  = document.getElementById('detail-img');
const ripple  = document.getElementById('ripple-layer');

let panX = 0, panY = 0;          // current pan offset (CSS translate)
let cards = [];
let inDetail = false;
let detailIdx = -1;
let sketchAnimating = false;

/* ---- helpers ---- */
function setWorldTransform(x, y){
  world.style.transform = `translate(${x}px,${y}px)`;
}

/* center the world so the cluster of paintings is visible on enter */
function initPan(){
  // find bounding box of all cards
  let minX=Infinity,minY=Infinity,maxX=0,maxY=0;
  LAYOUT.forEach(l=>{
    minX=Math.min(minX,l.x); minY=Math.min(minY,l.y);
    maxX=Math.max(maxX,l.x+l.w); maxY=Math.max(maxY,l.y+l.h);
  });
  const clusterW = maxX-minX, clusterH = maxY-minY;
  const vw = window.innerWidth, vh = window.innerHeight;
  panX = (vw-clusterW)/2 - minX;
  panY = (vh-clusterH)/2 - minY;
  setWorldTransform(panX, panY);
}

/* ---- build cards ---- */
function buildCards(){
  LAYOUT.forEach((l,i)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.style.left = l.x+'px';
    card.style.top  = l.y+'px';
    card.style.width = l.w+'px';
    card.style.height = l.h+'px';

    const img = document.createElement('img');
    img.src = SRCS[i];
    img.alt = '';
    card.appendChild(img);
    world.appendChild(card);
    cards.push(card);

    card.addEventListener('click', ()=>{ if(!inDetail) openDetail(i); });
  });
}

/* ---- open detail ---- */
function openDetail(idx){
  inDetail = true;
  detailIdx = idx;

  /* size the detail image to fit screen nicely */
  const vw = window.innerWidth, vh = window.innerHeight;
  const maxW = vw - 40, maxH = vh - 100;
  const l = LAYOUT[idx];
  const ratio = l.h / l.w;
  let fw = maxW, fh = fw * ratio;
  if(fh > maxH){ fh = maxH; fw = fh / ratio; }

  detailCard.style.width  = fw+'px';
  detailCard.style.height = fh+'px';
  detailImg.src = SRCS[idx];
  ripple.style.backgroundImage = `url('${PHOTO_SRC}')`;
  ripple.style.opacity = '0';
  ripple.style.transition = 'none';
  ripple.style.webkitMaskImage = 'none';
  ripple.style.maskImage = 'none';

  detail.classList.add('in');
  sketchAnimating = false;
}

/* ---- close detail ---- */
function closeDetail(){
  if(!inDetail) return;
  inDetail = false;
  detail.classList.remove('in');
  sketchAnimating = false;
}

/* ---- sketch interaction (idx===1) ---- */
function triggerSketch(e){
  if(sketchAnimating) return;
  sketchAnimating = true;

  const rect = detailCard.getBoundingClientRect();
  const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
  const cx = ((clientX - rect.left) / rect.width  * 100).toFixed(1);
  const cy = ((clientY - rect.top)  / rect.height * 100).toFixed(1);

  ripple.style.transition = 'none';
  ripple.style.opacity = '1';
  ripple.style.webkitMaskImage = `radial-gradient(circle at ${cx}% ${cy}%, black 0%, transparent 0%)`;
  ripple.style.maskImage        = `radial-gradient(circle at ${cx}% ${cy}%, black 0%, transparent 0%)`;

  let r = 0;
  (function expand(){
    r += 2;
    const mask = `radial-gradient(circle at ${cx}% ${cy}%, black ${r-1}%, transparent ${r+8}%)`;
    ripple.style.webkitMaskImage = mask;
    ripple.style.maskImage = mask;
    if(r < 180){
      requestAnimationFrame(expand);
    } else {
      ripple.style.webkitMaskImage = 'none';
      ripple.style.maskImage = 'none';
      ripple.style.opacity = '1';
      /* hold 2s then fade out in 1s */
      setTimeout(()=>{
        ripple.style.transition = 'opacity 1s ease';
        ripple.style.opacity = '0';
        setTimeout(()=>{ sketchAnimating = false; }, 1100);
      }, 2000);
    }
  })();
}

/* detail card tap: sketch or nothing */
detailCard.addEventListener('click', e=>{
  if(detailIdx === 1) triggerSketch(e);
});

/* ===== PAN (two-finger drag on gallery) ===== */
let panTouches = [];
let panStart = {x:0,y:0};
let panOrigin = {x:0,y:0};
let isPanning = false;

gallery.addEventListener('touchstart', e=>{
  panTouches = Array.from(e.touches);
  if(panTouches.length === 2 && !inDetail){
    isPanning = true;
    const cx = (panTouches[0].clientX + panTouches[1].clientX)/2;
    const cy = (panTouches[0].clientY + panTouches[1].clientY)/2;
    panStart  = {x:cx, y:cy};
    panOrigin = {x:panX, y:panY};
  }
},{passive:true});

gallery.addEventListener('touchmove', e=>{
  e.preventDefault();
  const ts = Array.from(e.touches);

  /* ---- two-finger pinch in detail = close ---- */
  if(inDetail && ts.length === 2){
    /* detect pinch: compare distance */
    if(panTouches.length === 2){
      const d0 = Math.hypot(panTouches[0].clientX-panTouches[1].clientX, panTouches[0].clientY-panTouches[1].clientY);
      const d1 = Math.hypot(ts[0].clientX-ts[1].clientX, ts[0].clientY-ts[1].clientY);
      if(d1 < d0 * 0.82) closeDetail();
    }
    panTouches = ts;
    return;
  }

  /* ---- two-finger pan on gallery ---- */
  if(!inDetail && ts.length === 2 && isPanning){
    const cx = (ts[0].clientX + ts[1].clientX)/2;
    const cy = (ts[0].clientY + ts[1].clientY)/2;
    panX = panOrigin.x + (cx - panStart.x);
    panY = panOrigin.y + (cy - panStart.y);
    setWorldTransform(panX, panY);
  }
  panTouches = ts;
},{passive:false});

gallery.addEventListener('touchend', e=>{
  panTouches = Array.from(e.touches);
  if(panTouches.length < 2) isPanning = false;
},{passive:true});

/* ===== PINCH TO CLOSE detail (touchstart in detail) ===== */
let detailPinchStart = 0;
detail.addEventListener('touchstart', e=>{
  panTouches = Array.from(e.touches);
  if(e.touches.length === 2){
    detailPinchStart = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
},{passive:true});

detail.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(!inDetail) return;
  const ts = Array.from(e.touches);
  if(ts.length === 2){
    const d = Math.hypot(ts[0].clientX-ts[1].clientX, ts[0].clientY-ts[1].clientY);
    if(detailPinchStart > 0 && d < detailPinchStart * 0.8) closeDetail();
  }
},{passive:false});

/* ===== MOUSE support (desktop) ===== */
let mousePanning = false, mouseStartX=0, mouseStartY=0, mouseOriginX=0, mouseOriginY=0;
gallery.addEventListener('mousedown', e=>{
  if(inDetail) return;
  mousePanning = true;
  mouseStartX = e.clientX; mouseStartY = e.clientY;
  mouseOriginX = panX; mouseOriginY = panY;
});
window.addEventListener('mousemove', e=>{
  if(!mousePanning || inDetail) return;
  panX = mouseOriginX + e.clientX - mouseStartX;
  panY = mouseOriginY + e.clientY - mouseStartY;
  setWorldTransform(panX, panY);
});
window.addEventListener('mouseup', ()=>{ mousePanning = false; });
window.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDetail(); });

/* ===== ENTER ===== */
document.getElementById('enterBtn').addEventListener('click', ()=>{
  cover.classList.add('out');
  enterWrap.style.display = 'none';
  setTimeout(()=>{
    cover.style.display = 'none';
    gallery.classList.add('in');
    buildCards();
    initPan();
  }, 900);
});
</script>
</body>
</html>
